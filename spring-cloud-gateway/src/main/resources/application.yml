server:
  port: 8090

spring:
  security:
    user:
      name: disabled
      password: disabled
  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
  cloud:
    gateway:
      mvc:
        routes:
          - id: User-Service
            uri: http://user-service:8080
            predicates:
              - Path=/user/**
              - Method=GET,POST,PUT,DELETE,PATCH
            filters:
              - StripPrefix=1
          - id: Wallet-Service
            uri: http://wallet-service:7072
            predicates:
              - Path=/wallet/**
              - Method=GET,POST,PUT,DELETE,PATCH
            filters:
              - StripPrefix=1

logging:
  level:
    root: INFO
    org.springframework.cloud.gateway: DEBUG
    com.truecodes.gateway.JwtAuthenticationFilter: DEBUG
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always